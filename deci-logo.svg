<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 200" width="860" height="200">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&amp;family=Plus+Jakarta+Sans:wght@300;400;700;800&amp;display=swap');
    </style>

    <linearGradient id="gA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#7F52FF"/>
      <stop offset="100%" stop-color="#E879A0"/>
    </linearGradient>
    <linearGradient id="gB" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#C062E8"/>
      <stop offset="100%" stop-color="#7F52FF"/>
    </linearGradient>
  </defs>

  <!-- White background -->
  <rect width="860" height="200" fill="#FFFFFF"/>

  <!-- ─── ICON (same hexagon shard, cx=100 cy=100) ─── -->
  <polygon points="100,16 172,58 172,142 100,184 28,142 28,58" fill="#F3EEFF" opacity="0.7"/>
  <polygon points="100,100 28,58 28,142"             fill="url(#gA)"/>
  <polygon points="100,100 28,58 100,16 172,58"      fill="url(#gA)" opacity="0.85"/>
  <polygon points="100,100 172,58 172,142"           fill="url(#gB)"/>
  <polygon points="100,100 28,142 100,184 172,142"   fill="url(#gB)" opacity="0.7"/>
  <line x1="100" y1="100" x2="28"  y2="58"  stroke="white" stroke-width="1" opacity="0.5"/>
  <line x1="100" y1="100" x2="172" y2="58"  stroke="white" stroke-width="1" opacity="0.5"/>
  <line x1="100" y1="100" x2="172" y2="142" stroke="white" stroke-width="1" opacity="0.5"/>
  <line x1="100" y1="100" x2="28"  y2="142" stroke="white" stroke-width="1" opacity="0.5"/>
  <line x1="100" y1="100" x2="100" y2="16"  stroke="white" stroke-width="1" opacity="0.5"/>
  <line x1="100" y1="100" x2="100" y2="184" stroke="white" stroke-width="1" opacity="0.5"/>
  <circle cx="100" cy="100" r="13" fill="white" opacity="0.25"/>
  <circle cx="100" cy="100" r="9"  fill="white"/>

  <!-- ─── WORDMARK — dark, subtle ─── -->
  <text
    x="200" y="132"
    font-family="'Plus Jakarta Sans', -apple-system, sans-serif"
    font-weight="800"
    font-size="90"
    letter-spacing="-3"
    fill="#1A1033">Deci</text>

  <!-- ─── MATH ACCENT — decimal expansion running beside the name ─── -->
  <!-- Sits at top-right of the wordmark, very faint, mono -->
  <text
    x="420" y="54"
    font-family="'JetBrains Mono', monospace"
    font-weight="400"
    font-size="11"
    letter-spacing="1"
    fill="#C084FC"
    opacity="0.55">1 ÷ 3 = 0.333333333...</text>

  <text
    x="420" y="71"
    font-family="'JetBrains Mono', monospace"
    font-weight="400"
    font-size="11"
    letter-spacing="1"
    fill="#A78BFA"
    opacity="0.38">π = 3.14159265358979...</text>

  <text
    x="420" y="88"
    font-family="'JetBrains Mono', monospace"
    font-weight="400"
    font-size="11"
    letter-spacing="1"
    fill="#C084FC"
    opacity="0.25">√2 = 1.41421356237...</text>

  <!-- Thin separator line between math lines and tagline -->
  <line x1="420" y1="96" x2="830" y2="96" stroke="#DDD6FE" stroke-width="0.7" opacity="0.8"/>

  <!-- ─── TAGLINE ─── -->
  <text
    x="200" y="162"
    font-family="'JetBrains Mono', monospace"
    font-weight="400"
    font-size="12.5"
    letter-spacing="0.2"
    fill="#7C5CBF"
    opacity="0.65">Precise decimal arithmetic · Kotlin Multiplatform</text>
</svg>
