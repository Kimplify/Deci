name: CI

on:
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  changelog:
    name: Changelog Updated
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check CHANGELOG.md was modified
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q '^CHANGELOG.md$'; then
            echo "CHANGELOG.md was updated."
          else
            echo "::error::CHANGELOG.md was not modified. Please add a changelog entry for this PR."
            exit 1
          fi

  test:
    name: Test All Platforms
    runs-on: macOS-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 21

      - name: Validate Gradle wrapper
        uses: gradle/wrapper-validation-action@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Lint check
        run: ./gradlew :deci:ktlintCheck

      - name: API compatibility check
        run: ./gradlew :deci:apiCheck

      - name: Run JVM tests
        run: ./gradlew :deci:jvmTest

      - name: Run iOS tests
        run: ./gradlew :deci:iosSimulatorArm64Test

      - name: Run JS tests
        run: ./gradlew :deci:jsTest

      - name: Run WasmJs tests
        run: ./gradlew :deci:wasmJsTest

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-reports
          path: |
            deci/build/reports/tests/
            deci/build/test-results/
          retention-days: 30

  build:
    name: Build Library
    needs: test
    runs-on: macOS-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build library
        run: ./gradlew build --no-configuration-cache
